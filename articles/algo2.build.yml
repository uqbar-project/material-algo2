# .github/workflows/build.yml
# Basado en la documentacion de GitHub Actions
# => https://docs.github.com/en/actions
name: build

# "on" controla cuando se ejecuta la action.
# Para push: se dispara en main, master, develop y development.
# Para pull_request: solo en PRs que apunten a main, master, develop o development.
on:
  push:
    branches: [master, main, develop, development]
  pull_request:
    branches: [master, main, develop, development]

jobs:
  gradle-plus-coverage:
    runs-on: ubuntu-latest
    # Permisos explícitos en lugar de depender de los defaults del repositorio.
    # "contents: write" es necesario para que el job pueda hacer el push del badge al repo.
    # "pull-requests: write" es necesario para que el job pueda comentar la cobertura en el PR.
    permissions:
      contents: write
      pull-requests: write

    steps:
      # Primero hacemos checkout a nuestro repo para que el job pueda acceder al mismo.
      - name: Checkout Repo
        # Para muchas funcionalidades, podemos aprovechar workflow pre-construidos mediante "uses"
        uses: actions/checkout@v6

      # Configuramos el Java apropiado en nuestro ubuntu.
      - name: Set Up Java
        uses: actions/setup-java@v5
        # "with" nos deja especificar parámetros del action que importamos, tales como versión y distribución a usar.
        with:
          distribution: 'temurin'
          java-version: '21'

      # También podemos ejecutar comandos de bash, mediante "run"
      - run: |
          chmod +x ./gradlew

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Run test with coverage
        run: ./gradlew test jacocoTestReport

      # Mediante jacoco, genera reportes de cobertura en distintos formatos (html, csv, lcov, entre otros).
      # Con el reporte en formato csv generamos una imagen svg que publica el % de código cubierto por los tests.
      # Cabe aclarar que esto se crea en el ubuntu de GH Actions (donde corre el CI), pero no se encuentra en el repositorio (todavía).
      - name: Generate JaCoCo Badge
        uses: cicirello/jacoco-badge-generator@v2
        with:
          badges-directory: .github/badges
          generate-coverage-badge: true
          coverage-badge-filename: jacoco.svg
          jacoco-csv-file: build/reports/jacoco/test/jacocoTestReport.csv

      # Para persistir el badge de cobertura que generamos, podemos hacer un push a la rama desde el ubuntu.
      # Siendo ejecutado "por github mismo", tendrá permiso para commitear.
      # Solo se actualiza en pushes a main/master, de forma tal que el badge siempre refleje
      # la cobertura del código en producción y no se vea afectado por pushes a develop/development.
      - name: Commit and push badge
        if: ${{ github.event_name != 'pull_request' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') }}
        run: |
          cd .github/badges
          if [[ `git status --porcelain *.svg` ]]; then
          git config --global user.name 'github-actions'
          git config --global user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add *.svg
          git commit -m "Autogenerated JaCoCo coverage badge" *.svg
          git push
          fi

      # Comentamos en el PR la cobertura
      # Solo se comenta en PRs cuya rama destino sea develop o development.
      # "update-comment: true" hace que se actualice el comentario existente en lugar
      # de crear uno nuevo por cada push.
      - name: Post coverage summary in PR
        if: ${{ github.event_name == 'pull_request' && (github.base_ref == 'develop' || github.base_ref == 'development') }}
        uses: madrapps/jacoco-report@v1.7.2
        with:
          paths: ${{ github.workspace }}/build/reports/jacoco/test/jacocoTestReport.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          title: Estado Actual de Cobertura
          update-comment: true

      # Subimos el reporte de cobertura a Codecov, que almacena el historial y
      # genera gráficos de evolución de cobertura a lo largo del tiempo.
      # Solo se sube en pushes a main/master o en PRs hacia main/master, de forma tal
      # que Codecov refleje el estado del código que va a impactar en producción.
      - name: Upload coverage reports to Codecov
        if: ${{ (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') || (github.event_name == 'pull_request' && (github.base_ref == 'main' || github.base_ref == 'master')) }}
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: ${{ github.repository }}
